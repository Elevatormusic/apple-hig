<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Delete account</title>
<style>
  :root{color-scheme:light dark;--bg:#fff;--label:#1c1c1e;--faint:#c7c7cc;--tint:#0a84ff}
  @media(prefers-color-scheme:dark){:root{--bg:#000;--label:#fff;--faint:#3a3a3c}}
  body{margin:0;background:var(--bg);color:var(--label);font:17px/1.4 -apple-system,system-ui,sans-serif}
  .wrap{max-width:420px;margin:0 auto;padding:24px}
  h1{font-size:24px;font-weight:700;margin:0 0 16px}
  /* the irreversible consequence is buried: tiny, faint, below the fold of attention */
  .warn{font-size:11px;color:var(--faint);margin:18px 0 0}
  /* the destructive action is styled as a calm, prominent primary -- looks safe */
  .btn{display:block;width:100%;min-height:44px;margin:20px 0 0;border:0;border-radius:12px;
       font:600 17px -apple-system;background:var(--tint);color:#fff}
</style></head><body><div class="wrap">
  <h1>Account</h1>
  <p>Manage your profile, subscription, and preferences from this screen.</p>
  <button class="btn">Delete account</button>
  <p class="warn">This permanently erases all your data and cannot be undone.</p>
</div></body></html>
