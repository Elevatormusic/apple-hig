<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Analytics</title>
<!-- A correct DESKTOP-WEB dashboard: web-native top nav + sidebar, semantic HTML, no iOS chrome.
     The reviewer must NOT flag it for "lacking a bottom tab bar / SF Symbols / iOS sheets". -->
<style>
  :root{color-scheme:light dark;--bg:#fff;--panel:#f7f7f8;--label:#16181d;--label2:#5b5f66;--line:#e3e5e8;--accent:#2563eb}
  @media(prefers-color-scheme:dark){:root{--bg:#0f1115;--panel:#171a21;--label:#e7e9ee;--label2:#9aa0aa;--line:#272b33}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--label);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  header{display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;border-bottom:1px solid var(--line)}
  header .brand{font-weight:700}
  header nav{display:flex;gap:18px;margin-left:12px}
  header nav a{color:var(--label2);text-decoration:none;padding:18px 0;border-bottom:2px solid transparent}
  header nav a[aria-current=page]{color:var(--label);border-color:var(--accent)}
  .shell{display:flex;min-height:calc(100vh - 56px)}
  aside{width:200px;border-right:1px solid var(--line);padding:14px}
  aside a{display:block;color:var(--label2);text-decoration:none;padding:7px 8px;border-radius:6px}
  aside a:hover{background:var(--panel)}
  main{flex:1;padding:24px}
  h1{font-size:22px;margin:0 0 16px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
  .kpi{border:1px solid var(--line);border-radius:10px;padding:16px}
  .kpi .n{font-size:28px;font-weight:700}.kpi .l{color:var(--label2);font-size:13px}
  table{width:100%;border-collapse:collapse;margin-top:24px;font-size:14px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--label2);font-weight:600}
</style></head><body>
<header><span class="brand">Acme</span><nav><a href="/overview" aria-current="page">Overview</a><a href="/reports">Reports</a><a href="/settings">Settings</a></nav></header>
<div class="shell">
  <aside><a href="/users">Users</a><a href="/revenue">Revenue</a><a href="/events">Events</a><a href="/exports">Exports</a></aside>
  <main>
    <h1>Overview</h1>
    <div class="cards">
      <div class="kpi"><div class="n">12,418</div><div class="l">Active users</div></div>
      <div class="kpi"><div class="n">$84.2k</div><div class="l">MRR</div></div>
      <div class="kpi"><div class="n">3.1%</div><div class="l">Churn</div></div>
    </div>
    <table><thead><tr><th>Plan</th><th>Users</th><th>MRR</th></tr></thead>
      <tbody><tr><td>Pro</td><td>4,210</td><td>$52.1k</td></tr><tr><td>Team</td><td>1,034</td><td>$28.0k</td></tr></tbody></table>
  </main>
</div></body></html>
